<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ranax Social</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
     <link rel="stylesheet" href="assets/css/stylesheet.css">

</head>

<body>
    <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">


        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    <!-- Logo and Welcome Text -->
                    <div class="text-center mb-4">
                        <div class="login-logo mb-0">
                            <img src="assets/images/svg/logo.svg" alt="Ranax Social Logo">
                        </div>
                        <p class="textLightColor font-16 regular textLightColor">Welcome back</p>
                    </div>
                    <div class="login-card position-relative">
                        <!-- Background Decorative Elements -->
                        <div class="login-bg-vector-left position-absolute">
                            <img src="assets/images/svg/login-bg-vector.svg" alt="Background Vector">
                        </div>
                        <!-- Login Form -->
                        <form class="login-form position-relative">
                            <!-- Email Input -->
                            <div class="mb-3">
                                <label for="emailInput" class="mb-1 font-14 medium textColor">Email
                                    Address</label>
                                <input type="email" class="form-control login-input font-14" id="emailInput"
                                    placeholder="you@example.com">
                            </div>

                            <!-- Password Input -->
                            <div class="mb-3">
                                <label for="passwordInput" class="mb-1 font-14 medium textColor">Password</label>
                                <div class="password-wrapper position-relative">
                                    <input type="password" class="form-control login-input font-14" id="passwordInput"
                                        placeholder="••••••••">
                                    <button type="button"
                                        class="password-toggle-btn position-absolute cursor-pointer border-0 d-flex align-items-center justify-content-center"
                                        aria-label="Toggle password visibility">
                                        <img src="assets/images/svg/eye.svg" alt="Show password">
                                    </button>
                                </div>
                            </div>

                            <!-- Remember Me and Forgot Password -->
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="d-flex align-items-center gap-2">
                                    <input class="form-check-input cursor-pointer m-0" type="checkbox" id="rememberMe">
                                    <label class="cursor-pointer font-14 regular textColor" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                <a href="forgotPassword.html" class="forgot-password-link font-14 medium themeColor">Forgot password?</a>
                            </div>

                            <!-- Sign In Button -->
                            <button type="submit"
                                class="login-btn w-100 font-16 semibold mb-3 position-relative text-white cursor-pointer overflow-hidden border-0">Sign
                                in</button>

                            <!-- Divider -->
                            <div class="login-divider d-flex align-items-center mb-3">
                                <span class="divider-line flex-grow-1"></span>
                                <span class="divider-text font-14 regular textLightColor px-3">Or continue with</span>
                                <span class="divider-line flex-grow-1"></span>
                            </div>

                            <!-- Google Sign In -->
                            <button type="button"
                                class="google-btn w-100 font-16 medium d-flex justify-content-center align-items-center gap-2">
                                Sign Up with google
                                <img src="assets/images/svg/Google.svg" alt="Google" height="18">
                            </button>
                        </form>
                        <!-- Background Decorative Elements -->
                        <div class="login-bg-vector-right position-absolute">
                            <img src="assets/images/svg/login-bg-vector.svg" alt="Background Vector">
                        </div>
                    </div>
                    <!-- Sign Up Link -->
                    <div class="text-center mt-3">
                        <p class="font-16 regular textColor mb-2">
                            Don't have an account? <a href="signup.html" class="semibold themeColor"> Sign
                                up here</a>
                        </p>
                        <p class="font-12 regular textLightColor mb-0">
                            By signing in, you agree to our Terms of Service and
                            Privacy Policy
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/jquery.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/custom.js"></script>
</body>

</html>
